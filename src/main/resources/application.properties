spring.application.name=EPLMS

# H2 Database (prototype - swap to MySQL for production)
spring.datasource.url=jdbc:h2:mem:eplmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable Spring Boot auto SQL script execution (schema managed by Hibernate DDL)
spring.sql.init.mode=never

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=eplms-super-secret-key-must-be-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.eplms=DEBUG
logging.level.org.springframework.security=WARN
